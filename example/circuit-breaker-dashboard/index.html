<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Breaker Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Circuit Breaker Dashboard</h1>
<div class="grid">
  <div class="card" id="svc-auth"><div class="ring"><canvas width="120" height="120"></canvas></div><span class="name">auth-svc</span><span class="state">CLOSED</span></div>
  <div class="card" id="svc-payment"><div class="ring"><canvas width="120" height="120"></canvas></div><span class="name">payment-svc</span><span class="state">CLOSED</span></div>
  <div class="card" id="svc-inventory"><div class="ring"><canvas width="120" height="120"></canvas></div><span class="name">inventory-svc</span><span class="state">CLOSED</span></div>
  <div class="card" id="svc-shipping"><div class="ring"><canvas width="120" height="120"></canvas></div><span class="name">shipping-svc</span><span class="state">CLOSED</span></div>
  <div class="card" id="svc-email"><div class="ring"><canvas width="120" height="120"></canvas></div><span class="name">email-svc</span><span class="state">CLOSED</span></div>
  <div class="card" id="svc-search"><div class="ring"><canvas width="120" height="120"></canvas></div><span class="name">search-svc</span><span class="state">CLOSED</span></div>
</div>
<div class="log" id="log"></div>
<script src="app.js"></script>
</body>
</html>
