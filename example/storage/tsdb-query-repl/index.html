<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TSDB Query REPL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="repl">
  <div class="sidebar">
    <h2>◎ Series</h2>
    <ul id="series-list"></ul>
    <h2>Examples</h2>
    <ul class="examples">
      <li data-q="SELECT last(value) FROM temperature">last(temperature)</li>
      <li data-q="SELECT mean(value) FROM humidity WHERE tag=sensor-a">humidity by tag</li>
      <li data-q="SELECT max(value) FROM pressure GROUP BY 30s">max pressure</li>
      <li data-q="SELECT rate(value) FROM requests">rate(requests)</li>
    </ul>
  </div>
  <div class="main">
    <div class="terminal" id="terminal"></div>
    <div class="input-row">
      <span class="prompt">tsdb&gt;</span>
      <input id="input" autocomplete="off" placeholder="SELECT ... FROM ...">
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
