<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log Query Console</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <header>
    <h1>aggr&gt; query console</h1>
    <span class="count"><span id="hits">0</span> matches / <span id="total">0</span> events</span>
  </header>
  <div class="query-bar">
    <span class="prompt">$</span>
    <input id="q" placeholder="try: level:ERROR service:auth-svc status:5xx user:alice" autofocus>
  </div>
  <div class="chips" id="chips"></div>
  <div class="results" id="results"></div>
  <footer>
    <span>Grammar: <code>key:value</code> · free text · multiple terms AND-combined</span>
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
