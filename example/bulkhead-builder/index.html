<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulkhead Architect</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>Bulkhead Architect</h1>
  <p class="sub">Drag walls to position bulkheads. Test structural integrity with wave force.</p>
  <svg id="hull" viewBox="0 0 800 300"></svg>
  <div id="panel">
    <button id="addWall">+ Add Bulkhead</button>
    <button id="testBtn">Test Wave Force</button>
    <span id="score"></span>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
