<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Fox Lullaby Rhythm</h1>
  <div class="hud">
    <span>score <b id="score">0</b></span>
    <span>streak <b id="streak">0</b></span>
    <span>pity <b id="pity">0</b></span>
    <span>status <b id="status">SLEEPING</b></span>
  </div>
  <button id="start">start</button>
  <button id="reset">reset</button>
</header>
<main>
  <section class="stage">
    <canvas id="scene"></canvas>
    <svg id="ui" xmlns="http://www.w3.org/2000/svg">
      <line id="window-edge-a" x1="0" y1="0" x2="0" y2="0" stroke="#6ee7b7" stroke-dasharray="4 3" />
      <line id="window-edge-b" x1="0" y1="0" x2="0" y2="0" stroke="#6ee7b7" stroke-dasharray="4 3" />
      <circle id="bell-ring" r="48" fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0" />
    </svg>
    <div class="judgement" id="judgement"></div>
  </section>
  <aside class="panel">
    <div class="card">
      <h2>Bells</h2>
      <ol id="bells"></ol>
    </div>
    <div class="card">
      <h2>Event log</h2>
      <ul id="events"></ul>
    </div>
    <div class="card">
      <h2>How to hum</h2>
      <p>Press <kbd>space</kbd> or click the fox as a bell tolls. The closer to the bell's peak, the higher your grade.</p>
      <p>Miss three in a row and the window widens — that's the <i>pity</i> rule.</p>
    </div>
  </aside>
</main>
<script src="app.js"></script>
</body>
</html>
