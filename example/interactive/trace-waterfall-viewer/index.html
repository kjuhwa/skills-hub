<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Waterfall Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Trace Waterfall</h1>
    <div class="controls">
      <button id="btnGenerate">New Trace</button>
      <span id="traceId" class="trace-id"></span>
    </div>
  </header>
  <div id="waterfall"></div>
  <div id="tooltip" class="tooltip hidden"></div>
</div>
<script src="app.js"></script>
</body>
</html>
