<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Drifting Tea Garden Koan</title>
<link rel="stylesheet" href="style.css"/>
</head><body>
<header class="topbar">
  <h1>Drifting Tea Garden Koan</h1>
  <div class="hud">
    <span>Turn <b id="turn">1</b></span>
    <span>Chi <b id="chi">3</b>/<b id="chiMax">3</b></span>
    <span>Pity <b id="pity">0</b></span>
    <span>Streak <b id="streak">0</b></span>
    <kbd>1-4</kbd> cast · <kbd>p</kbd> pull · <kbd>u</kbd> undo · <kbd>space</kbd> end
  </div>
</header>
<main>
  <section class="board-wrap">
    <canvas id="board" width="560" height="560"></canvas>
  </section>
  <aside class="side">
    <div class="deck" id="deck"></div>
    <div class="log" id="log"></div>
  </aside>
</main>
<script src="app.js"></script>
</body></html>
