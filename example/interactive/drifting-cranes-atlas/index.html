<header>
  <h1>Drifting Cranes Atlas</h1>
  <label>seed <input id="seed" value="silver-river-lullaby" /></label>
  <label>tide <input id="tide" type="range" min="20" max="180" value="70" /></label>
  <label>density <input id="density" type="range" min="3" max="24" value="12" /></label>
  <button id="reseed">reseed</button>
</header>
<main>
  <section class="scene">
    <canvas id="sky"></canvas>
    <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
  </section>
  <aside class="panel">
    <div class="card" id="crane-card">
      <h2>Crane queue</h2>
      <ol id="queue"></ol>
    </div>
    <div class="card">
      <h2>Bell topology</h2>
      <svg id="ring" viewBox="-110 -110 220 220"></svg>
    </div>
    <div class="card">
      <h2>River health</h2>
      <div class="gauges">
        <div class="g"><span class="k">tide</span><b id="g-tide">—</b></div>
        <div class="g"><span class="k">lag</span><b id="g-lag">—</b></div>
        <div class="g"><span class="k">circuit</span><b id="g-circuit">CLOSED</b></div>
        <div class="g"><span class="k">pressure</span><b id="g-pressure">—</b></div>
      </div>
      <canvas id="spark"></canvas>
    </div>
    <div class="card">
      <h2>Whisper log</h2>
      <ul id="log"></ul>
    </div>
  </aside>
</main>
<dialog id="lullaby">
  <form method="dialog">
    <h3 id="lb-title">—</h3>
    <pre id="lb-body"></pre>
    <menu><button value="close">close</button></menu>
  </form>
</dialog>
<script src="app.js"></script>
</body>
</html>
