<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Strangler Fig Migrator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Strangler Fig Migrator</h1>
  <p class="subtitle">Gradually replace legacy endpoints with modern services</p>
</header>
<main>
  <section class="controls">
    <button id="migrate-one">Migrate Next Endpoint</button>
    <button id="rollback">Rollback</button>
    <button id="auto">Auto-Migrate</button>
    <div class="stats">
      <span>Legacy: <b id="legacy-count">0</b></span>
      <span>Modern: <b id="modern-count">0</b></span>
      <span>Traffic routed: <b id="traffic-pct">0%</b></span>
    </div>
  </section>
  <section class="diagram">
    <svg id="svg" viewBox="0 0 800 420"></svg>
  </section>
  <section class="log">
    <h3>Migration Log</h3>
    <ul id="log-list"></ul>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
