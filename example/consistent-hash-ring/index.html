<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Consistent Hash Ring</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <section class="side">
    <h1>Consistent Hash Ring</h1>
    <p class="lede">A load balancing strategy used by Cassandra, DynamoDB, and CDNs. Keys map to points on a ring; each is served by the next clockwise node.</p>
    <div class="controls">
      <button id="add">+ Add Node</button>
      <button id="remove">− Remove Node</button>
      <button id="addKeys">+ 20 Keys</button>
      <button id="clearKeys">Clear Keys</button>
    </div>
    <label class="vnode">
      Virtual nodes per server: <span id="vnVal">3</span>
      <input type="range" id="vn" min="1" max="20" value="3">
    </label>
    <h2>Distribution</h2>
    <div id="dist"></div>
    <div class="hint">Hover the ring to probe a key's route. Click a node to remove it.</div>
  </section>
  <section class="stage">
    <svg id="ring" viewBox="-250 -250 500 500"></svg>
    <div id="tooltip"></div>
  </section>
</div>
<script src="app.js"></script>
</body>
</html>
