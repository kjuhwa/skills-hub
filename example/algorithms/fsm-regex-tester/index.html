<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSM Regex Tester</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>🔤 FSM Regex Tester</h1>
  <p class="sub">Watch a finite-state machine process strings character by character</p>
  <div class="row">
    <label>Pattern:<select id="pattern">
      <option value="ab*c">ab*c</option>
      <option value="(01)+">Binary pairs (01)+</option>
      <option value="a(b|c)d">a(b|c)d</option>
    </select></label>
    <label>Input:<input id="input" type="text" value="abbbc" maxlength="20"></label>
    <button id="run">▶ Run</button>
  </div>
  <svg id="svg" viewBox="0 0 700 220"></svg>
  <div id="tape"></div>
  <div id="result"></div>
</div>
<script src="app.js"></script>
</body>
</html>
