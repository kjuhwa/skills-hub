<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Filter False Positive Benchmark</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>False Positive <span class="accent">Benchmark</span></h1>
  <p class="sub">Compare false-positive rates across filter sizes and hash counts</p>
  <div class="controls">
    <label>Items to insert <input type="range" id="nItems" min="10" max="500" value="100"><span id="nVal">100</span></label>
    <label>Lookups <input type="range" id="nLookups" min="100" max="2000" value="500"><span id="lVal">500</span></label>
    <button id="runBtn">Run Benchmark</button>
  </div>
  <canvas id="chart"></canvas>
  <div id="legend" class="legend"></div>
</div>
<script src="app.js"></script>
</body>
</html>
