<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strangler Fig Migration Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>Strangler Fig Pattern &mdash; Migration Tracker</h1>
  <p class="sub">Click a monolith module to migrate it to a microservice.</p>
  <div class="board">
    <div class="col" id="monolith"><h2>Monolith</h2></div>
    <div class="col mid"><svg id="arrows" width="120" height="400"></svg></div>
    <div class="col" id="services"><h2>Microservices</h2></div>
  </div>
  <div class="stats">
    <span>Migrated: <b id="migrated">0</b>/8</span>
    <span>Traffic routed: <b id="traffic">0</b>%</span>
    <div class="bar"><div id="barFill"></div></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
