<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strangler Fig Growth Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>Strangler Fig Growth Simulator</h1>
  <div class="controls">
    <button id="startBtn">Start Growth</button>
    <button id="resetBtn">Reset</button>
    <label>Speed <input type="range" id="speed" min="1" max="10" value="5"></label>
    <span id="year">Year: 0</span>
  </div>
  <canvas id="canvas" width="600" height="500"></canvas>
  <p class="info">Watch the strangler fig envelop its host tree over decades.</p>
</div>
<script src="app.js"></script>
</body>
</html>
