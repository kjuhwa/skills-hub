<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cache Cluster Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <h1>Cache Cluster Defender</h1>
    <div class="hud">
      <div>Score: <span id="score">0</span></div>
      <div>Hit Rate: <span id="hitRate">0%</span></div>
      <div>Wave: <span id="wave">1</span></div>
      <div>Health: <span id="health">100</span></div>
    </div>
  </header>
  <p class="tip">Requests stream from the client. Place cache nodes on the ring to handle them. Balanced loads earn more score; overloaded nodes crash!</p>
  <div class="stage">
    <svg id="board" viewBox="0 0 600 600"></svg>
    <div class="side">
      <h3>Deploy</h3>
      <button id="deploy">+ Node ($20)</button>
      <button id="upgrade">↑ Upgrade Ring ($30)</button>
      <div class="coins">💰 <span id="coins">60</span></div>
      <h3>Nodes</h3>
      <div id="nodeList"></div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
