<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aggregate Invariant Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Order Aggregate: Invariant Simulator</h1>
  <p>Execute commands. Invariants are checked; violations are rejected with a reason.</p>
</header>
<main>
  <section class="state">
    <h2>Aggregate State</h2>
    <div id="state-view"></div>
  </section>
  <section class="cmds">
    <h2>Commands</h2>
    <div class="btns">
      <button data-cmd="add">Add Line Item</button>
      <button data-cmd="remove">Remove Line Item</button>
      <button data-cmd="discount">Apply 20% Discount</button>
      <button data-cmd="submit">Submit Order</button>
      <button data-cmd="cancel">Cancel Order</button>
      <button data-cmd="reset" class="reset">Reset</button>
    </div>
    <h2>Event Log</h2>
    <ol id="log"></ol>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
