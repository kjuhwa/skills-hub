<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDD Aggregate Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Aggregate Builder</h1><span class="sub">Design domain aggregates visually</span></header>
<div id="app">
  <aside id="palette">
    <h3>Palette</h3>
    <button data-type="root">Aggregate Root</button>
    <button data-type="entity">Entity</button>
    <button data-type="vo">Value Object</button>
    <button data-type="event">Domain Event</button>
  </aside>
  <main id="board"></main>
  <aside id="props"><h3>Properties</h3><div id="detail">Select an element</div></aside>
</div>
<script src="app.js"></script>
</body>
</html>
