<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aggregate State Flow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Order Aggregate · Live State Flow</h1>
  <div class="controls">
    <button id="tick">Emit Command</button>
    <button id="reset">Reset</button>
    <span id="status">Ready</span>
  </div>
</header>
<main>
  <section id="stateViz">
    <canvas id="diagram" width="640" height="360"></canvas>
  </section>
  <section id="log">
    <h2>Event Log</h2>
    <ul id="events"></ul>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
