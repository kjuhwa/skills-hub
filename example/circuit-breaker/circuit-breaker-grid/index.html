<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Microservice Breaker Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>Microservice Breaker Grid</h1>
  <p class="sub">Live health dashboard — click a service to toggle chaos injection</p>
  <div class="toolbar">
    <button id="pauseBtn">Pause traffic</button>
    <button id="chaosAll">Chaos: all services</button>
    <button id="healAll">Heal all</button>
    <span class="tps">Requests/sec: <b id="tps">0</b></span>
  </div>
  <div class="grid" id="grid"></div>
  <div class="chart-wrap">
    <h3>Aggregate error rate (last 60s)</h3>
    <canvas id="chart" width="900" height="140"></canvas>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
