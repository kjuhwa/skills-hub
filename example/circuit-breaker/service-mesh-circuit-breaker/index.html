<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circuit Breaker Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Service Mesh · Circuit Breaker Lab</h1>
<div class="grid">
  <div class="panel">
    <h2>Configuration</h2>
    <label>Failure threshold: <span id="tVal">5</span><input id="threshold" type="range" min="2" max="15" value="5"></label>
    <label>Reset timeout (s): <span id="rVal">4</span><input id="reset" type="range" min="2" max="10" value="4"></label>
    <label>Upstream error rate: <span id="eVal">30</span>%<input id="errRate" type="range" min="0" max="100" value="30"></label>
    <div class="state-display">
      <div>State: <span id="state" class="state closed">CLOSED</span></div>
      <div>Consecutive failures: <span id="fails">0</span></div>
      <div>Next probe: <span id="probe">—</span></div>
    </div>
    <button id="fire">Send Request</button>
    <button id="auto">Auto Traffic</button>
  </div>
  <div class="panel">
    <h2>Request Timeline</h2>
    <svg id="timeline" viewBox="0 0 600 300"></svg>
    <div class="legend">
      <span><i style="background:#6ee7b7"></i>success</span>
      <span><i style="background:#f87171"></i>failure</span>
      <span><i style="background:#fbbf24"></i>rejected (open)</span>
      <span><i style="background:#60a5fa"></i>half-open probe</span>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
