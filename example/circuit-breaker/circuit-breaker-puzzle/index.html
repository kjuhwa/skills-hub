<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circuit Breaker Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>Circuit Breaker Puzzle</h1>
  <p class="sub">Click wires to rotate. Connect the power source to the target without overload!</p>
  <div class="info">
    <span>Level: <b id="level">1</b></span>
    <span>Moves: <b id="moves">0</b></span>
    <span id="status">Working...</span>
  </div>
  <div id="board"></div>
  <div class="actions">
    <button id="nextBtn">Next Puzzle</button>
    <button id="resetBtn">Reset</button>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
