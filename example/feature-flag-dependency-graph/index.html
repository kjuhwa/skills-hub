<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flag Dependency Graph</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside>
    <h2>Flags</h2>
    <ul id="flagList"></ul>
    <div class="legend">
      <div><span class="dot on"></span> Enabled</div>
      <div><span class="dot off"></span> Disabled</div>
      <div><span class="dot blocked"></span> Blocked by deps</div>
    </div>
  </aside>
  <main>
    <h1>Feature Flag Dependencies</h1>
    <p class="hint">Click a flag to toggle it. Dependents activate only when all parents are on.</p>
    <svg id="graph" viewBox="0 0 700 500"></svg>
    <div id="detail" class="detail">Select a flag to inspect.</div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
