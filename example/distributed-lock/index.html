<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Distributed Lock Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div id="header-left">
        <span class="header-icon">&#x1F512;</span>
        <h1>Distributed Lock Visualizer</h1>
      </div>
      <div id="header-right">
        <span id="sim-time-display">T: 0.0s</span>
      </div>
    </header>

    <!-- Control Panel -->
    <div id="control-panel">
      <div class="ctrl-group">
        <button id="btn-play" class="btn btn-primary" title="Play">&#9654; Play</button>
        <button id="btn-pause" class="btn" title="Pause">&#9646;&#9646; Pause</button>
        <button id="btn-step" class="btn" title="Step">&#9654;&#9646; Step</button>
        <button id="btn-reset" class="btn btn-danger" title="Reset">&#8635; Reset</button>
      </div>

      <div class="ctrl-group">
        <label>Speed</label>
        <input type="range" id="speed-slider" min="0.5" max="4" step="0.5" value="1" />
        <span id="speed-label">1x</span>
      </div>

      <div class="ctrl-group">
        <label>Scenario</label>
        <select id="scenario-select">
          <option value="happy">Happy Path</option>
          <option value="deadlock">Deadlock</option>
          <option value="thundering">Thundering Herd</option>
          <option value="splitbrain">Split Brain</option>
          <option value="backoff">Retry with Backoff</option>
        </select>
      </div>

      <div class="ctrl-group">
        <label>Lock Type</label>
        <div class="toggle-group">
          <button id="btn-mongo" class="btn btn-toggle active">MongoDB</button>
          <button id="btn-redis" class="btn btn-toggle">Redis</button>
        </div>
      </div>

      <div class="ctrl-group">
        <label>Nodes</label>
        <input type="range" id="node-count" min="2" max="5" step="1" value="3" />
        <span id="node-count-label">3</span>
      </div>

      <div class="ctrl-group">
        <label>TTL</label>
        <input type="range" id="ttl-slider" min="5" max="60" step="5" value="30" />
        <span id="ttl-label">30s</span>
      </div>

      <div class="ctrl-group">
        <label>Jitter</label>
        <label class="switch">
          <input type="checkbox" id="jitter-toggle" />
          <span class="slider-sw"></span>
        </label>
        <input type="range" id="jitter-pct" min="5" max="30" step="5" value="15" />
        <span id="jitter-label">15%</span>
      </div>
    </div>

    <!-- Main content area -->
    <div id="main-content">
      <!-- Canvas area -->
      <div id="canvas-wrapper">
        <canvas id="main-canvas"></canvas>
      </div>

      <!-- Right sidebar -->
      <div id="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title" id="lock-store-title">
            <span class="dot dot-mongo"></span>
            <span id="lock-store-label">MongoDB Lock Store</span>
          </div>
          <pre id="lock-doc-view" class="code-view">No lock held</pre>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title">Node Status</div>
          <div id="node-status-list"></div>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-title">TTL Bars</div>
          <div id="ttl-bars"></div>
        </div>

        <div class="sidebar-section" id="command-log-section">
          <div class="sidebar-title">Command Log</div>
          <div id="command-log"></div>
        </div>
      </div>
    </div>

    <!-- Event Timeline -->
    <div id="timeline-panel">
      <div id="timeline-header">
        <span>Event Timeline</span>
        <div id="timeline-legend">
          <span class="leg-item"><span class="leg-dot" style="background:#6ee7b7"></span>ACQUIRE</span>
          <span class="leg-item"><span class="leg-dot" style="background:#818cf8"></span>RELEASE</span>
          <span class="leg-item"><span class="leg-dot" style="background:#fbbf24"></span>EXPIRE</span>
          <span class="leg-item"><span class="leg-dot" style="background:#f87171"></span>DEADLOCK</span>
          <span class="leg-item"><span class="leg-dot" style="background:#38bdf8"></span>RETRY</span>
          <span class="leg-item"><span class="leg-dot" style="background:#fb923c"></span>CONFLICT</span>
        </div>
      </div>
      <div id="timeline-scroll">
        <canvas id="timeline-canvas"></canvas>
      </div>
      <div id="tooltip" class="tooltip hidden"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
