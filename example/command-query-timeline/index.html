<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command-Query Timeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Command-Query Timeline</h1>
  <div class="controls">
    <button id="btnCommand" class="btn cmd">+ Command</button>
    <button id="btnQuery" class="btn qry">+ Query</button>
    <button id="btnClear" class="btn clear">Clear</button>
  </div>
  <canvas id="timeline" width="900" height="340"></canvas>
  <div id="stats" class="stats"></div>
</div>
<script src="app.js"></script>
</body>
</html>
