<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retry Curve Composer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>Retry Curve Composer</h1>
  <div class="panel">
    <div class="knobs">
      <label>Strategy <select id="strat"><option value="exp">Exponential</option><option value="lin">Linear</option><option value="fix">Fixed</option><option value="decorr">Decorrelated Jitter</option></select></label>
      <label>Base (ms) <input id="base" type="number" value="500" min="100" max="5000" step="100"></label>
      <label>Cap (ms) <input id="cap" type="number" value="30000" min="1000" max="60000" step="1000"></label>
      <label>Max Retries <input id="max" type="number" value="8" min="1" max="15"></label>
      <label>Jitter ± % <input id="jitter" type="range" min="0" max="50" value="20"><span id="jitterVal">20</span></label>
    </div>
    <svg id="chart" viewBox="0 0 700 300"></svg>
    <div id="table"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
