<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptime Heatmap</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Uptime Heatmap — Last 30 Days</h1>
  <div id="tooltip" class="tip"></div>
  <div id="heatmap"></div>
  <div class="legend"><span class="box down"></span>Down <span class="box degraded"></span>Degraded <span class="box ok"></span>Healthy</div>
</div>
<script src="app.js"></script>
</body>
</html>
