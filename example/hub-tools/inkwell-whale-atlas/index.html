<body>
<header class="bar">
  <h1>Inkwell Whale Atlas</h1>
  <div class="legend">
    <span class="pill lantern">lantern</span>
    <span class="pill whale">whale</span>
    <span class="pill star">star</span>
    <span class="meta" id="meta">drift 0</span>
  </div>
  <div class="controls">
    <label>drift <input id="drift" type="range" min="0" max="100" value="35"/></label>
    <label>lanterns <input id="lamps" type="range" min="3" max="40" value="16"/></label>
    <label>whales <input id="whales" type="range" min="1" max="12" value="5"/></label>
    <button id="reseed">reseed</button>
  </div>
</header>
<main>
  <canvas id="sea" width="1200" height="700"></canvas>
  <svg id="stars" viewBox="0 0 1200 700" preserveAspectRatio="none"></svg>
</main>
<aside id="panel" hidden>
  <button class="x" id="close">×</button>
  <h2 id="pt"></h2>
  <pre id="pb"></pre>
</aside>
<script src="app.js"></script>
