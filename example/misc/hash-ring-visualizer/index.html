<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hash Ring Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <h1>Hash Ring Visualizer</h1>
    <p>Click the ring to add keys. Add/remove nodes to see redistribution.</p>
  </header>
  <div class="controls">
    <button id="addNode">+ Add Node</button>
    <button id="removeNode">− Remove Node</button>
    <button id="addKey">+ Random Key</button>
    <button id="reset">Reset</button>
    <label>Virtual nodes: <input type="range" id="vnodes" min="1" max="20" value="5"><span id="vnodesVal">5</span></label>
  </div>
  <div class="main">
    <canvas id="ring" width="560" height="560"></canvas>
    <aside class="stats">
      <h2>Load Distribution</h2>
      <div id="distribution"></div>
      <h2>Stats</h2>
      <div id="stats"></div>
    </aside>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
