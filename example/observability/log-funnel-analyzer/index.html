<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Funnel Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>Log Aggregation Funnel</h1>
  <p class="sub">Trace how logs flow through the pipeline stages</p>
  <div class="row">
    <canvas id="funnel" width="420" height="340"></canvas>
    <div id="panel">
      <div id="stats"></div>
      <h3>Top Error Patterns</h3>
      <div id="patterns"></div>
    </div>
  </div>
  <div class="bar-section">
    <h3>Source Breakdown</h3>
    <div id="bars"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
