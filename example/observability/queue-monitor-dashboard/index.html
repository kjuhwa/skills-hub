<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue Monitor Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>Queue Monitor</h1><span class="live">● LIVE</span></header>
<div class="grid">
  <div class="card" id="throughput"><h2>Throughput</h2><canvas id="tpChart"></canvas></div>
  <div class="card" id="depths"><h2>Queue Depths</h2><div id="bars"></div></div>
  <div class="card" id="log"><h2>Recent Events</h2><ul id="events"></ul></div>
  <div class="card" id="kpis"><h2>KPIs</h2><div id="kpiGrid"></div></div>
</div>
<script src="app.js"></script>
</body>
</html>
