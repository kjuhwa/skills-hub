<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Stream Waterfall</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Log Stream Waterfall</h1>
    <div class="controls">
      <select id="levelFilter"><option value="all">All Levels</option><option value="ERROR">Error</option><option value="WARN">Warn</option><option value="INFO">Info</option><option value="DEBUG">Debug</option></select>
      <button id="toggleBtn">Pause</button>
    </div>
  </header>
  <div class="main">
    <canvas id="waterfall"></canvas>
    <div id="logPanel"></div>
  </div>
  <footer>
    <span id="stats"></span>
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
