<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schema Compatibility Matrix</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>Schema Compatibility Matrix</h1>
  <p class="sub">Cross-version read/write compatibility for registered schemas</p>
  <div class="legend"><span class="leg-item"><span class="dot ok"></span>Compatible</span><span class="leg-item"><span class="dot warn"></span>Partial</span><span class="leg-item"><span class="dot fail"></span>Incompatible</span></div>
  <div class="matrix-wrap"><svg id="matrix"></svg></div>
  <div id="info" class="info"></div>
</div>
<script src="app.js"></script>
</body>
</html>
