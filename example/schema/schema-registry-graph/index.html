<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Schema Dependency Graph</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Schema Dependency Graph</h1>
  <div class="stats">
    <span><b id="nodeCount">0</b> subjects</span>
    <span><b id="edgeCount">0</b> references</span>
  </div>
</header>
<main>
  <canvas id="graph"></canvas>
  <aside id="panel">
    <h2 id="panelTitle">Click a node</h2>
    <div id="panelBody"></div>
  </aside>
</main>
<script src="app.js"></script>
</body>
</html>
