<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raft Term Timeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Raft Term Timeline</h1>
  <p>Historical view of 5-node cluster terms. Hover for details, drag to scrub.</p>
</header>
<div class="wrap">
  <svg id="timeline" viewBox="0 0 900 360"></svg>
  <div id="info">
    <h3>Event Details</h3>
    <div id="detail"><em>Hover over any term or event</em></div>
  </div>
  <div class="controls">
    <button id="regen">Regenerate History</button>
    <label>Chaos: <input type="range" id="chaos" min="0" max="100" value="35"/> <span id="chaosVal">35%</span></label>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
