<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Actor REPL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <div class="header">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="title">actor-repl · vanilla v1.0</span>
    </div>
    <div id="output"></div>
    <div class="prompt">
      <span>›</span>
      <input id="input" autofocus autocomplete="off" placeholder="type 'help' to see commands">
    </div>
  </div>
<script src="app.js"></script>
</body>
</html>
