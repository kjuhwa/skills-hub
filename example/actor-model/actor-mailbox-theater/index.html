<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Actor Mailbox Theater</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Actor Mailbox Theater</h1>
  <div class="controls">
    <button id="send">Send Message</button>
    <button id="spawn">Spawn Actor</button>
    <button id="kill">Kill Random</button>
    <label>Speed <input id="speed" type="range" min="1" max="10" value="5"></label>
  </div>
</header>
<main>
  <canvas id="stage"></canvas>
  <aside id="log"></aside>
</main>
<script src="app.js"></script>
</body>
</html>
