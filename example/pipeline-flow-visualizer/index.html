<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline Flow Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Pipeline Flow Visualizer</h1>
  <div class="controls">
    <button id="toggleBtn">Pause</button>
    <button id="boostBtn">Boost Throughput</button>
    <button id="failBtn">Inject Failure</button>
    <span id="stats">Events: 0 | Rate: 0/s</span>
  </div>
</header>
<main>
  <canvas id="pipeCanvas"></canvas>
  <aside id="log"></aside>
</main>
<script src="app.js"></script>
</body>
</html>
