<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Skill Graph</title>
<style>
:root {
  --bg: #07090c;
  --bg-2: #0f1319;
  --fg: #c9d1d9;
  --fg-dim: #6b7280;
  --border: #1c222b;
  --accent: #7ee787;
  --accent-2: #79c0ff;
  --amber: #ffa657;
  --mag: #d2a8ff;
  --red: #ff7b72;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100vh; overflow: hidden; background: var(--bg); color: var(--fg);
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
#canvas { position: absolute; inset: 0; cursor: grab; }
#canvas:active { cursor: grabbing; }
#topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; gap: 10px; align-items: center; padding: 8px 12px;
  background: linear-gradient(to bottom, #000c 0%, #0000 100%);
  pointer-events: none;
}
#topbar > * { pointer-events: auto; }
#topbar .logo { color: var(--accent); font-weight: 600; }
#topbar .logo::before { content: "▶ "; color: var(--fg-dim); }
#topbar input {
  background: #0f1319e6; border: 1px solid var(--border); color: var(--fg);
  padding: 5px 9px; border-radius: 4px; font-family: inherit; font-size: 12px; outline: none;
  width: 240px;
}
#topbar input:focus { border-color: var(--accent); }
#topbar .stats { color: var(--fg-dim); margin-left: auto; font-size: 11px; }
#topbar .stats b { color: var(--accent); }
#legend {
  position: absolute; top: 52px; left: 12px; z-index: 10;
  background: #0f1319dd; border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 10px; font-size: 11px; line-height: 1.8;
}
#legend .swatch {
  display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px;
  vertical-align: -1px;
}
#legend h4 { margin: 0 0 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--fg-dim); font-weight: 600; }
#detail {
  position: absolute; top: 52px; right: 12px; bottom: 12px; width: 320px;
  z-index: 10; background: #0f1319f2; border: 1px solid var(--border); border-radius: 4px;
  padding: 14px; overflow-y: auto; display: none;
}
#detail.visible { display: block; }
#detail h2 { margin: 0 0 6px; font-size: 14px; font-family: system-ui, sans-serif; color: var(--fg); }
#detail .crumb { color: var(--fg-dim); font-size: 10px; margin-bottom: 8px; }
#detail .crumb .t { color: var(--accent); }
#detail .crumb .c { color: var(--mag); }
#detail .desc { color: var(--fg); font-size: 12px; line-height: 1.5; margin-bottom: 10px;
  border-left: 2px solid var(--accent); padding-left: 8px; }
#detail .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
#detail .chip { font-size: 10px; padding: 1px 6px; border-radius: 10px;
  border: 1px solid var(--border); color: var(--amber); background: #ffa6571a; }
#detail .chip.source { color: var(--accent-2); background: #79c0ff1a; }
#detail .neigh { font-size: 10px; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 4px; }
#detail a.neighbor {
  display: block; color: var(--fg); text-decoration: none; padding: 3px 6px;
  border-radius: 3px; font-size: 11px; cursor: pointer;
}
#detail a.neighbor:hover { background: var(--border); }
#detail a.neighbor .type { color: var(--fg-dim); }
#detail button.close {
  position: absolute; top: 8px; right: 8px; background: transparent; border: 0;
  color: var(--fg-dim); font-size: 16px; cursor: pointer;
}
#status {
  position: absolute; bottom: 10px; left: 12px; color: var(--fg-dim); font-size: 10px;
  background: #0f1319cc; padding: 4px 8px; border-radius: 3px; z-index: 10;
}
.tooltip {
  position: absolute; background: #0f1319f2; border: 1px solid var(--border);
  color: var(--fg); font-size: 11px; padding: 4px 8px; border-radius: 3px;
  pointer-events: none; z-index: 20; display: none;
}
</style>
</head>
<body>
<svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
<div id="topbar">
  <span class="logo">skill-graph</span>
  <input id="q" placeholder="filter by name/tag…" spellcheck="false" />
  <span class="stats" id="stats">loading…</span>
</div>
<div id="legend">
  <h4>legend</h4>
  <div id="legend-items"></div>
  <div style="margin-top:6px;color:var(--fg-dim);font-size:10px">
    drag · scroll to zoom · click node
  </div>
</div>
<div id="detail">
  <button class="close" id="close">×</button>
  <div id="detail-body"></div>
</div>
<div id="status">initializing…</div>
<div class="tooltip" id="tip"></div>

<script>
const CATEGORY_COLOR = {
  arch:        '#d2a8ff',
  backend:     '#7ee787',
  frontend:    '#79c0ff',
  devops:      '#ffa657',
  testing:     '#ff7b72',
  workflow:    '#f0db4f',
  pitfall:     '#ff7b72',
  decision:    '#d2a8ff',
  api:         '#79c0ff',
  domain:      '#a5d6a7',
  uncategorized: '#6b7280',
};
function color(cat) { return CATEGORY_COLOR[cat] || '#8b949e'; }

const svg = document.getElementById('canvas');
const tip = document.getElementById('tip');
const detail = document.getElementById('detail');
const detailBody = document.getElementById('detail-body');

let nodes = [], edges = [], nodeById = new Map();
let width = innerWidth, height = innerHeight;
let tx = 0, ty = 0, scale = 1;
let draggingNode = null, draggingCanvas = false, lastMouse = { x: 0, y: 0 };
let selectedId = null, filterQ = '';

function resize() {
  width = innerWidth; height = innerHeight;
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
}
addEventListener('resize', resize);
resize();

fetch('graph.json').then(r => r.json()).then(boot);

function boot(g) {
  nodes = g.nodes.map(n => ({
    ...n,
    x: width / 2 + (Math.random() - 0.5) * 200,
    y: height / 2 + (Math.random() - 0.5) * 200,
    vx: 0, vy: 0,
    degree: 0,
  }));
  for (const n of nodes) nodeById.set(n.id, n);
  edges = g.edges.filter(e => nodeById.has(e.source) && nodeById.has(e.target));
  for (const e of edges) {
    nodeById.get(e.source).degree++;
    nodeById.get(e.target).degree++;
  }
  document.getElementById('stats').innerHTML =
    `<b>${nodes.length}</b> nodes · <b>${edges.length}</b> edges`;
  buildLegend();
  render();
  simulate();
}

function buildLegend() {
  const cats = [...new Set(nodes.map(n => n.category))].sort();
  document.getElementById('legend-items').innerHTML =
    cats.map(c => `<div><span class="swatch" style="background:${color(c)}"></span>${c}</div>`).join('');
}

// ── force simulation (Verlet, ~30 iters/frame) ──
let running = true;
function simulate() {
  const CHARGE = -80;
  const SPRING = 0.015;
  const DAMP = 0.88;
  const CENTER = 0.0008;
  const IDEAL = 60;

  requestAnimationFrame(simulate);
  if (!running) return;

  // repulsion (O(n^2) — 430 nodes still fine)
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    if (a === draggingNode) continue;
    for (let j = i + 1; j < nodes.length; j++) {
      const b = nodes[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      let d2 = dx*dx + dy*dy; if (d2 < 25) d2 = 25;
      const f = CHARGE / d2;
      const d = Math.sqrt(d2);
      const fx = f * dx / d, fy = f * dy / d;
      a.vx -= fx; a.vy -= fy;
      b.vx += fx; b.vy += fy;
    }
  }
  // springs
  for (const e of edges) {
    const a = nodeById.get(e.source), b = nodeById.get(e.target);
    const dx = b.x - a.x, dy = b.y - a.y;
    const d = Math.sqrt(dx*dx + dy*dy) || 1;
    const f = SPRING * (d - IDEAL) * (1 + Math.log(1 + e.weight) * 0.3);
    const fx = f * dx / d, fy = f * dy / d;
    if (a !== draggingNode) { a.vx += fx; a.vy += fy; }
    if (b !== draggingNode) { b.vx -= fx; b.vy -= fy; }
  }
  // center pull + integrate
  for (const n of nodes) {
    if (n === draggingNode) continue;
    n.vx += (width/2 - n.x) * CENTER;
    n.vy += (height/2 - n.y) * CENTER;
    n.vx *= DAMP; n.vy *= DAMP;
    n.x += n.vx; n.y += n.vy;
  }
  render();
}

// ── render ──
let gLinks, gNodes, gRoot;
function render() {
  if (!gRoot) {
    gRoot = el('g', { id: 'root' });
    gLinks = el('g', { id: 'links' });
    gNodes = el('g', { id: 'nodes' });
    gRoot.appendChild(gLinks); gRoot.appendChild(gNodes);
    svg.appendChild(gRoot);
    svg.appendChild(tip); // reparent for z-order
  }
  gRoot.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`);

  const passes = (n) => !filterQ || matches(n, filterQ);
  const highlightedIds = new Set(nodes.filter(passes).map(n => n.id));

  // links
  while (gLinks.firstChild) gLinks.removeChild(gLinks.firstChild);
  for (const e of edges) {
    const a = nodeById.get(e.source), b = nodeById.get(e.target);
    const hl = highlightedIds.has(a.id) || highlightedIds.has(b.id);
    const line = el('line', {
      x1: a.x, y1: a.y, x2: b.x, y2: b.y,
      stroke: e.src > 0 ? '#ffa65733' : '#79c0ff33',
      'stroke-width': Math.min(2.5, 0.4 + e.weight * 0.25),
      opacity: hl ? 0.9 : 0.15,
    });
    gLinks.appendChild(line);
  }
  // nodes
  while (gNodes.firstChild) gNodes.removeChild(gNodes.firstChild);
  for (const n of nodes) {
    const r = Math.max(3, Math.min(11, 3 + Math.log(1 + n.degree) * 2.5));
    const hl = highlightedIds.has(n.id);
    const isSel = selectedId === n.id;
    const g = el('g', { 'data-id': n.id, transform: `translate(${n.x} ${n.y})`, style: 'cursor:pointer' });
    const c = el('circle', {
      r, fill: color(n.category),
      'fill-opacity': hl ? 0.95 : 0.2,
      stroke: isSel ? '#fff' : (n.type === 'skill' ? '#fff6' : '#0000'),
      'stroke-width': isSel ? 2 : (n.type === 'skill' ? 0.6 : 0),
    });
    g.appendChild(c);
    if (hl && (r >= 7 || isSel)) {
      const t = el('text', { x: r + 3, y: 3, fill: '#c9d1d9', 'font-size': 9, 'pointer-events': 'none' });
      t.textContent = n.name;
      g.appendChild(t);
    }
    g.addEventListener('pointerdown', (ev) => startDrag(ev, n));
    g.addEventListener('pointerenter', (ev) => showTip(ev, n));
    g.addEventListener('pointerleave', hideTip);
    g.addEventListener('click', (ev) => { ev.stopPropagation(); select(n); });
    gNodes.appendChild(g);
  }
  document.getElementById('status').textContent =
    filterQ ? `filter: "${filterQ}" — ${highlightedIds.size} matches` :
    `drag to rearrange · scroll to zoom · ${nodes.length} nodes`;
}

function el(name, attrs) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

function matches(n, q) {
  const qq = q.toLowerCase();
  return (n.name + ' ' + n.category + ' ' + (n.tags||[]).join(' ') + ' ' + (n.description||'') + ' ' + (n.source||'')).toLowerCase().includes(qq);
}

// ── interactions ──
function startDrag(ev, n) {
  draggingNode = n; running = true;
  const p = svgCoords(ev); n.x = p.x; n.y = p.y; n.vx = n.vy = 0;
  ev.stopPropagation(); svg.setPointerCapture(ev.pointerId);
}
svg.addEventListener('pointerdown', (ev) => {
  if (draggingNode) return;
  draggingCanvas = true; lastMouse = { x: ev.clientX, y: ev.clientY };
  svg.setPointerCapture(ev.pointerId);
});
svg.addEventListener('pointermove', (ev) => {
  if (draggingNode) {
    const p = svgCoords(ev);
    draggingNode.x = p.x; draggingNode.y = p.y; draggingNode.vx = draggingNode.vy = 0;
  } else if (draggingCanvas) {
    tx += ev.clientX - lastMouse.x;
    ty += ev.clientY - lastMouse.y;
    lastMouse = { x: ev.clientX, y: ev.clientY };
  }
});
svg.addEventListener('pointerup', (ev) => {
  draggingNode = null; draggingCanvas = false;
  svg.releasePointerCapture(ev.pointerId);
});
svg.addEventListener('wheel', (ev) => {
  ev.preventDefault();
  const factor = Math.exp(-ev.deltaY * 0.001);
  const newScale = Math.max(0.2, Math.min(4, scale * factor));
  const p = { x: ev.clientX, y: ev.clientY };
  tx = p.x - (p.x - tx) * (newScale / scale);
  ty = p.y - (p.y - ty) * (newScale / scale);
  scale = newScale;
}, { passive: false });
svg.addEventListener('click', () => { if (!draggingNode && !draggingCanvas) clearDetail(); });
function svgCoords(ev) { return { x: (ev.clientX - tx) / scale, y: (ev.clientY - ty) / scale }; }

function showTip(ev, n) {
  tip.style.display = 'block';
  tip.style.left = ev.clientX + 10 + 'px';
  tip.style.top = ev.clientY + 10 + 'px';
  tip.textContent = `${n.name} [${n.category}]`;
}
function hideTip() { tip.style.display = 'none'; }

function select(n) {
  selectedId = n.id;
  const neigh = edges
    .filter(e => e.source === n.id || e.target === n.id)
    .map(e => ({ id: e.source === n.id ? e.target : e.source, w: e.weight, src: e.src, tag: e.tag }))
    .sort((a, b) => b.w - a.w);
  detail.classList.add('visible');
  detailBody.innerHTML = `
    <div class="crumb"><span class="t">${n.type}</span> / <span class="c">${esc(n.category)}</span></div>
    <h2>${esc(n.name)}</h2>
    ${n.description ? `<div class="desc">${esc(n.description)}</div>` : ''}
    <div class="chips">
      ${(n.tags || []).map(t => `<span class="chip">${esc(t)}</span>`).join('')}
      ${n.source ? `<span class="chip source">📦 ${esc(n.source)}</span>` : ''}
    </div>
    <div class="neigh">connected to (${neigh.length})</div>
    ${neigh.slice(0, 20).map(nb => {
      const o = nodeById.get(nb.id);
      return `<a class="neighbor" data-id="${o.id}">${esc(o.name)} <span class="type">[${o.type.slice(0,1)}]</span></a>`;
    }).join('')}
  `;
  detailBody.querySelectorAll('a.neighbor').forEach(a => {
    a.addEventListener('click', () => select(nodeById.get(a.dataset.id)));
  });
  render();
}
function clearDetail() {
  selectedId = null;
  detail.classList.remove('visible');
  render();
}
function esc(s) { return String(s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
document.getElementById('close').addEventListener('click', clearDetail);

document.getElementById('q').addEventListener('input', (ev) => {
  filterQ = ev.target.value.trim();
  render();
});
addEventListener('keydown', (ev) => {
  if (ev.target.tagName === 'INPUT') {
    if (ev.key === 'Escape') { ev.target.value=''; filterQ=''; ev.target.blur(); render(); }
    return;
  }
  if (ev.key === '/') { ev.preventDefault(); document.getElementById('q').focus(); }
  else if (ev.key === 'Escape') clearDetail();
  else if (ev.key === ' ') { ev.preventDefault(); running = !running; }
});
</script>
</body>
</html>
