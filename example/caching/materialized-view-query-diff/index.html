<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MV Query Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>&#9889; Base Table vs Materialized View</h1></header>
<div class="container">
  <div class="panel">
    <h2>Base Query <span class="dim">(live aggregation)</span></h2>
    <pre id="baseSql" class="sql"></pre>
    <button id="runBase">Run Query</button>
    <div id="baseResult" class="result"></div>
  </div>
  <div class="panel">
    <h2>MV Query <span class="dim">(pre-computed)</span></h2>
    <pre id="mvSql" class="sql"></pre>
    <button id="runMv">Run Query</button>
    <div id="mvResult" class="result"></div>
  </div>
</div>
<div class="compare" id="compare"></div>
<script src="app.js"></script>
</body>
</html>
