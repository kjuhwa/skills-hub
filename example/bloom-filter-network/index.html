<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom Filter Hash Network</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Hash Function <span class="accent">Network</span></h1>
  <p class="sub">See how words map through hash functions to bit positions</p>
  <div class="controls">
    <input type="text" id="wordInput" placeholder="Add a word..." />
    <button id="addBtn">Add</button>
  </div>
  <svg id="network" viewBox="0 0 700 400"></svg>
  <div id="words" class="words"></div>
</div>
<script src="app.js"></script>
</body>
</html>
