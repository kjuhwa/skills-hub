<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Sourcing Canvas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>🎨 Draw & Replay — Every Stroke is an Event</h1>
  <div class="toolbar">
    <button id="btnReplay">▶ Replay All</button>
    <button id="btnUndo">↩ Undo</button>
    <button id="btnClear">✕ Clear</button>
    <input id="color" type="color" value="#6ee7b7">
    <input id="size" type="range" min="1" max="12" value="3">
    <span id="evtCount">0 events</span>
  </div>
  <canvas id="canvas"></canvas>
</div>
<script src="app.js"></script>
</body>
</html>
