<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CQS Separator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>CQS Method Analyzer</h1>
  <p class="sub">Paste a class or type methods to classify as Command or Query</p>
  <textarea id="input" rows="6" placeholder="e.g. getUser(), setName(n), deleteAll(), count()"></textarea>
  <button id="analyze" class="btn">Analyze</button>
  <div id="results" class="results"></div>
</div>
<script src="app.js"></script>
</body>
</html>
