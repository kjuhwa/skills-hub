<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ship Bulkhead Flood</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>SS Resilience — Compartment Flooding</h1>
  <p>Click a hull section to breach it. Watertight bulkheads contain the flood.</p>
</header>
<div class="wrap">
  <canvas id="ship" width="900" height="360"></canvas>
  <aside>
    <div class="telemetry">
      <h2>Hull Integrity</h2>
      <div class="bar"><div id="integrity-fill"></div></div>
      <div id="integrity-text">100%</div>
    </div>
    <div class="telemetry">
      <h2>Log</h2>
      <ul id="log"></ul>
    </div>
    <button id="repair">Seal &amp; Pump Out</button>
  </aside>
</div>
<script src="app.js"></script>
</body>
</html>
