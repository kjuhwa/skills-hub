<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CQS Code Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>CQS Analyzer</h1>

  <div id="results"></div>
</div>
<script src="app.js"></script>
</body>
</html>
