<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idempotency Proof Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>🧪 Idempotency Proof Lab</h1>
<p class="subtitle">Test mathematical functions — apply them N times and see if f(f(x)) = f(x)</p>
<div class="row">
  <div class="input-group">
    <label>Input value (x)</label>
    <input type="number" id="inputX" value="7">
  </div>
  <div class="input-group">
    <label>Applications (N)</label>
    <input type="range" id="nSlider" min="1" max="20" value="5">
    <span id="nVal">5</span>
  </div>
</div>
<div id="cards"></div>
<canvas id="graph" width="700" height="220"></canvas>
<script src="app.js"></script>
</body>
</html>
