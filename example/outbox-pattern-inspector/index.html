<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outbox Pattern Inspector</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>Outbox<span>Inspector</span></h2>
    <div class="stats">
      <div class="stat"><span id="stat-pending">0</span><label>Pending</label></div>
      <div class="stat"><span id="stat-sent">0</span><label>Sent</label></div>
      <div class="stat"><span id="stat-failed">0</span><label>Failed</label></div>
    </div>
    <div class="filters">
      <button class="filter active" data-filter="all">All</button>
      <button class="filter" data-filter="pending">Pending</button>
      <button class="filter" data-filter="sent">Sent</button>
      <button class="filter" data-filter="failed">Failed</button>
    </div>
    <button id="replay" class="primary">Replay Failed</button>
    <button id="generate">Generate Events</button>
  </aside>
  <main>
    <header>
      <h1>Event Stream</h1>
      <input id="search" type="text" placeholder="Filter by aggregate / type...">
    </header>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>ID</th><th>Aggregate</th><th>Type</th><th>Payload</th>
          <th>Attempts</th><th>Status</th><th>Created</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div id="detail" class="detail">
      <h3>Select an event to inspect payload</h3>
    </div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
