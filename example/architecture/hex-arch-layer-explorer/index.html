<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexagonal Layer Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>⬡ Hexagonal Architecture Layer Explorer</h1>
<div class="main">
  <canvas id="canvas" width="500" height="500"></canvas>
  <div id="detail">
    <h2 id="d-title">Hover a layer</h2>
    <p id="d-desc">Move your mouse over the hexagonal rings to explore each architectural layer.</p>
    <ul id="d-items"></ul>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
