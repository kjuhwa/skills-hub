<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Arch Flow Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Hexagonal Architecture Flow Simulator</h1>
<div class="toolbar">
  <select id="scenario">
    <option value="0">Create Order (REST → DB)</option>
    <option value="1">Send Notification (Event → Email)</option>
    <option value="2">Query Report (GraphQL → Cache)</option>
  </select>
  <button id="btnRun" class="btn">▶ Run Flow</button>
  <span id="status"></span>
</div>
<div class="grid">
  <div class="col" id="left"><h3>Driving Side</h3></div>
  <div class="col" id="center"><h3>Domain Core</h3></div>
  <div class="col" id="right"><h3>Driven Side</h3></div>
</div>
<div id="timeline"></div>
<script src="app.js"></script>
</body>
</html>
