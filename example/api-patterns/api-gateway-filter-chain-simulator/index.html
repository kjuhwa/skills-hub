<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gateway Filter Chain</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>Gateway Filter Chain Simulator</h1>
  <p class="sub">A request walks through the gateway's filter pipeline. Toggle filters and send requests.</p>
  <div class="content">
    <div class="pipeline">
      <div class="source">REQUEST</div>
      <svg id="arrows" width="100%" height="60"></svg>
      <div id="filters"></div>
      <svg id="arrows2" width="100%" height="60"></svg>
      <div class="sink" id="sink">UPSTREAM</div>
    </div>
    <div class="panel">
      <h2>Send Request</h2>
      <div class="form">
        <input id="token" placeholder="Bearer token" value="valid-abc123">
        <input id="path" placeholder="/api/path" value="/api/orders">
        <button id="send">Send Request</button>
      </div>
      <h2>Log</h2>
      <div id="log"></div>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
