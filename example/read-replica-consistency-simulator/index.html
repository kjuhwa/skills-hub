<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Read Replica Consistency Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Consistency Simulator</h1>
  <div class="subtitle">Write on PRIMARY — watch replicas catch up under replication lag</div>
</header>
<main>
  <div class="grid">
    <div class="node primary">
      <div class="label">PRIMARY</div>
      <div class="value" id="primaryVal">balance = 100</div>
      <div class="tick">tick: <span id="primaryTick">0</span></div>
    </div>
    <div class="node replica" data-id="0">
      <div class="label">REPLICA-01 <span class="lag" id="lag0">0s</span></div>
      <div class="value" id="rVal0">balance = 100</div>
      <div class="q" id="q0"></div>
    </div>
    <div class="node replica" data-id="1">
      <div class="label">REPLICA-02 <span class="lag" id="lag1">0s</span></div>
      <div class="value" id="rVal1">balance = 100</div>
      <div class="q" id="q1"></div>
    </div>
    <div class="node replica" data-id="2">
      <div class="label">REPLICA-03 <span class="lag" id="lag2">0s</span></div>
      <div class="value" id="rVal2">balance = 100</div>
      <div class="q" id="q2"></div>
    </div>
  </div>
  <div class="controls">
    <div class="group">
      <label>New Balance</label>
      <input type="number" id="newVal" value="250">
      <button id="writeBtn">WRITE to Primary</button>
    </div>
    <div class="group">
      <label>Replica Lag (s)</label>
      <div class="slider-row">
        <span>R1</span><input type="range" id="s0" min="0" max="10" step="0.5" value="1">
      </div>
      <div class="slider-row">
        <span>R2</span><input type="range" id="s1" min="0" max="10" step="0.5" value="3">
      </div>
      <div class="slider-row">
        <span>R3</span><input type="range" id="s2" min="0" max="10" step="0.5" value="6">
      </div>
    </div>
    <div class="group">
      <button id="readBtn">READ from Random Replica</button>
      <div id="readResult" class="result">—</div>
    </div>
  </div>
  <section class="timeline">
    <h2>Event Log</h2>
    <div id="events"></div>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
