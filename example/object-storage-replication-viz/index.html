<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Replication Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>Cross-Region Object Replication</h1>
  <div class="controls">
    <button id="upload">⬆ Upload Object</button>
    <button id="burst">⚡ Burst (10 objects)</button>
    <label>Latency: <input type="range" id="lat" min="200" max="2000" value="800"></label>
    <span>Replicated: <b id="rep">0</b> / <b id="tot">0</b></span>
  </div>
  <canvas id="cv" width="900" height="500"></canvas>
  <div class="log" id="log"></div>
</div>
<script src="app.js"></script>
</body>
</html>
