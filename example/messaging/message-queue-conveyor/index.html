<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Queue Conveyor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Message Queue Conveyor</h1>
  <div class="stats">
    <span>Produced: <b id="produced">0</b></span>
    <span>Consumed: <b id="consumed">0</b></span>
    <span>In Queue: <b id="inqueue">0</b></span>
    <span>Dropped: <b id="dropped">0</b></span>
  </div>
</header>
<main>
  <canvas id="stage" width="900" height="320"></canvas>
  <div class="controls">
    <label>Producer rate <input id="prate" type="range" min="0" max="100" value="40"></label>
    <label>Consumer rate <input id="crate" type="range" min="0" max="100" value="35"></label>
    <label>Capacity <input id="cap" type="range" min="5" max="40" value="20"></label>
    <button id="burst">Burst!</button>
    <button id="pause">Pause</button>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
