<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backpressure River</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header>
    <h1>Backpressure River</h1>
    <p>Watch particles flow through a constricted channel. Adjust the dam to create backpressure.</p>
  </header>
  <canvas id="river" width="800" height="320"></canvas>
  <div class="controls">
    <label>Producer Rate <input id="rate" type="range" min="1" max="60" value="30"></label>
    <label>Dam Width <input id="dam" type="range" min="5" max="100" value="60"></label>
    <label>Buffer Size <input id="buffer" type="range" min="20" max="500" value="150"></label>
  </div>
  <div class="stats">
    <div><span id="queued">0</span><small>queued</small></div>
    <div><span id="dropped">0</span><small>dropped</small></div>
    <div><span id="flow">0</span><small>flow/s</small></div>
    <div><span id="pressure">0%</span><small>pressure</small></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
