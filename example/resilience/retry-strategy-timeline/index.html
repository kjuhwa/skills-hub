<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retry Timeline Racer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Retry Timeline Racer</h1>
  <p class="sub">Watch three strategies race to complete the same failing request</p>
  <button id="raceBtn">Start Race</button>
  <div id="lanes"></div>
  <div id="legend"><span class="leg fail"></span> Failure <span class="leg ok"></span> Success <span class="leg wait"></span> Wait</div>
</div>
<script src="app.js"></script>
</body>
</html>
