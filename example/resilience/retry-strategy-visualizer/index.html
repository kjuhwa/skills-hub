<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retry Strategy Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Retry Strategy Visualizer</h1>
  <div class="controls">
    <label>Strategy:
      <select id="strategy">
        <option value="fixed">Fixed Delay</option>
        <option value="exponential" selected>Exponential Backoff</option>
        <option value="linear">Linear Backoff</option>
      </select>
    </label>
    <label>Base Delay (ms): <input type="range" id="baseDelay" min="100" max="2000" value="500"><span id="baseVal">500</span></label>
    <label>Max Retries: <input type="range" id="maxRetries" min="1" max="10" value="5"><span id="maxVal">5</span></label>
    <label>Jitter: <input type="checkbox" id="jitter"></label>
    <button id="runBtn">Run Simulation</button>
  </div>
  <canvas id="chart" width="800" height="350"></canvas>
  <div id="log"></div>
</div>
<script src="app.js"></script>
</body>
</html>
