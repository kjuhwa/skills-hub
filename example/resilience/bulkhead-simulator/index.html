<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulkhead Breach Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <h1>Bulkhead Breach Simulator</h1>
  <p class="sub">Click a compartment to breach it. Watch water flood — bulkheads contain the damage.</p>
  <canvas id="ship" width="900" height="400"></canvas>
  <div id="controls">
    <button id="resetBtn">Reset Ship</button>
    <span id="status">All compartments sealed</span>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
