<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retry Circuit Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Retry Circuit Dashboard</h1>
  <div class="grid">
    <div class="card" id="stateCard">
      <div class="label">Circuit State</div>
      <div class="big" id="stateText">CLOSED</div>
      <svg id="ring" width="100" height="100"><circle cx="50" cy="50" r="42" fill="none" stroke="#333" stroke-width="6"/><circle id="arc" cx="50" cy="50" r="42" fill="none" stroke="#6ee7b7" stroke-width="6" stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round" transform="rotate(-90 50 50)"/></svg>
    </div>
    <div class="card">
      <div class="label">Requests / sec</div>
      <canvas id="rpsChart" width="280" height="100"></canvas>
    </div>
    <div class="card">
      <div class="label">Failure Rate</div>
      <canvas id="failChart" width="280" height="100"></canvas>
    </div>
    <div class="card stats" id="stats"></div>
  </div>
  <div class="controls">
    <button onclick="injectFault()">Inject Fault</button>
    <button onclick="clearFault()">Clear Fault</button>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
