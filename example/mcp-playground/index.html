<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Protocol Playground</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">

  <!-- ===== TOP TOOLBAR ===== -->
  <header class="toolbar">
    <div class="toolbar-left">
      <span class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6"></polyline>
          <polyline points="8 6 2 12 8 18"></polyline>
        </svg>
        MCP Playground
      </span>
      <div class="separator"></div>
      <label class="toolbar-label" for="templateSelect">템플릿:</label>
      <select id="templateSelect" class="toolbar-select">
        <option value="">-- 템플릿 선택 --</option>
        <option value="file_read">file_read — 파일 읽기</option>
        <option value="file_write">file_write — 파일 쓰기</option>
        <option value="web_search">web_search — 웹 검색</option>
        <option value="database_query">database_query — SQL 쿼리</option>
        <option value="api_call">api_call — REST API 호출</option>
        <option value="code_execute">code_execute — 코드 실행</option>
        <option value="image_generate">image_generate — 이미지 생성</option>
        <option value="translate">translate — 언어 번역</option>
        <option value="summarize">summarize — 텍스트 요약</option>
        <option value="calendar_event">calendar_event — 캘린더 이벤트</option>
      </select>
    </div>
    <div class="toolbar-right">
      <button id="btnValidate" class="btn btn-primary" title="Ctrl+Enter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
        검증
      </button>
      <button id="btnFormat" class="btn btn-secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="21" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="3" y2="18"></line></svg>
        포맷
      </button>
      <div class="btn-group">
        <button id="btnCopy" class="btn btn-secondary" title="Ctrl+Shift+E">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          복사
        </button>
        <button id="btnDownload" class="btn btn-secondary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          내보내기
        </button>
      </div>
      <div class="separator"></div>
      <button id="btnTheme" class="btn btn-icon" title="테마 전환">
        <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </header>

  <!-- ===== MAIN AREA ===== -->
  <main class="workspace">

    <!-- LEFT PANE: JSON Schema Editor -->
    <section class="pane pane-editor" id="paneEditor">
      <div class="pane-header">
        <span class="pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          스키마 편집기
        </span>
        <span class="pane-hint">JSON MCP Tool Schema</span>
      </div>
      <div class="editor-wrap">
        <div class="line-numbers" id="lineNumbers"></div>
        <div class="editor-content">
          <textarea id="schemaEditor" class="schema-textarea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
          <div id="syntaxHighlight" class="syntax-overlay" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <!-- RESIZER 1 -->
    <div class="resizer" id="resizer1"></div>

    <!-- CENTER PANE: Visual Form Builder -->
    <section class="pane pane-form" id="paneForm">
      <div class="pane-header">
        <span class="pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="9" x2="9" y2="21"></line></svg>
          폼 빌더
        </span>
        <span class="pane-hint">자동 렌더링</span>
      </div>
      <div class="pane-body" id="formBuilderContainer">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="9" x2="9" y2="21"></line></svg>
          <p>스키마를 입력하거나 템플릿을 선택하면<br/>폼이 자동으로 렌더링됩니다.</p>
        </div>
      </div>
    </section>

    <!-- RESIZER 2 -->
    <div class="resizer" id="resizer2"></div>

    <!-- RIGHT PANE: Simulation Panel -->
    <section class="pane pane-sim" id="paneSim">
      <div class="pane-header">
        <span class="pane-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          시뮬레이션
        </span>
        <button id="btnExecute" class="btn btn-run">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          실행
        </button>
      </div>
      <div class="pane-body sim-body">
        <!-- Progress bar -->
        <div class="sim-progress-wrap" id="simProgressWrap" style="display:none">
          <div class="sim-progress-label">
            <span id="simStatusText">요청 전송 중...</span>
            <span id="simLatencyText"></span>
          </div>
          <div class="sim-progress-bar">
            <div class="sim-progress-fill" id="simProgressFill"></div>
          </div>
        </div>

        <!-- Request panel -->
        <div class="sim-section">
          <div class="sim-section-header">
            <span class="sim-badge req">REQUEST</span>
            <span class="sim-section-label">MCP 요청 페이로드</span>
          </div>
          <div class="code-block" id="simRequest">
            <span class="code-placeholder">실행 버튼을 누르면 요청이 표시됩니다.</span>
          </div>
        </div>

        <!-- Response panel -->
        <div class="sim-section">
          <div class="sim-section-header">
            <span class="sim-badge res">RESPONSE</span>
            <span class="sim-section-label">MCP 응답 페이로드</span>
            <span class="sim-latency-badge" id="latencyBadge" style="display:none"></span>
          </div>
          <div class="code-block" id="simResponse">
            <span class="code-placeholder">응답이 여기에 표시됩니다.</span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== BOTTOM VALIDATION PANEL ===== -->
  <footer class="validation-panel" id="validationPanel">
    <div class="validation-header" id="validationToggle">
      <span class="validation-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        검증 결과
      </span>
      <div class="validation-summary" id="validationSummary">
        <span class="vsummary-item" id="vsErrorCount">오류 0</span>
        <span class="vsummary-item warning" id="vsWarnCount">경고 0</span>
        <span class="vsummary-item ok" id="vsOkMsg">준비됨</span>
      </div>
      <svg class="toggle-chevron" id="valChevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
    </div>
    <div class="validation-body" id="validationBody">
      <ul class="validation-list" id="validationList">
        <li class="vitem info">스키마를 검증하려면 검증 버튼을 클릭하거나 Ctrl+Enter를 누르세요.</li>
      </ul>
    </div>
  </footer>

  <!-- ===== TOAST ===== -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
