<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bulkhead Ship Damage Control</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Ship Damage Control</h1>
  <p>Click any hull section to flood it. Sealed bulkheads contain water — the ship stays afloat as long as buoyancy holds.</p>
</header>
<main>
  <div class="toolbar">
    <button id="torpedo">Random Torpedo Hit</button>
    <button id="repair">Pump &amp; Seal</button>
    <button id="reset">Reset Ship</button>
    <span class="status" id="status">All compartments dry</span>
  </div>
  <svg id="ship" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="gauges">
    <div class="gauge">
      <label>Buoyancy</label>
      <div class="bar"><div id="buoy-fill"></div></div>
      <span id="buoy-val">100%</span>
    </div>
    <div class="gauge">
      <label>Flooded compartments</label>
      <div class="bar"><div id="flood-fill"></div></div>
      <span id="flood-val">0 / 8</span>
    </div>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
