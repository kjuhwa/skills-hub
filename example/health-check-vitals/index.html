<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vitals Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Personal Vitals Check</h1>
  <p class="subtitle">Daily health assessment</p>
  <div class="grid">
    <div class="card" data-vital="heart">
      <div class="label">Heart Rate</div>
      <div class="value"><span id="heart">72</span><span class="unit">bpm</span></div>
      <canvas class="spark" width="240" height="50"></canvas>
    </div>
    <div class="card" data-vital="oxygen">
      <div class="label">SpO₂</div>
      <div class="value"><span id="oxygen">98</span><span class="unit">%</span></div>
      <canvas class="spark" width="240" height="50"></canvas>
    </div>
    <div class="card" data-vital="temp">
      <div class="label">Temperature</div>
      <div class="value"><span id="temp">36.7</span><span class="unit">°C</span></div>
      <canvas class="spark" width="240" height="50"></canvas>
    </div>
    <div class="card" data-vital="stress">
      <div class="label">Stress Level</div>
      <div class="value"><span id="stress">32</span><span class="unit">/100</span></div>
      <canvas class="spark" width="240" height="50"></canvas>
    </div>
  </div>
  <div class="summary">
    <div class="score-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="70" fill="none" stroke="#2a2f3d" stroke-width="10"/>
        <circle id="score-arc" cx="80" cy="80" r="70" fill="none" stroke="#6ee7b7" stroke-width="10"
                stroke-dasharray="440" stroke-dashoffset="88" transform="rotate(-90 80 80)" stroke-linecap="round"/>
        <text x="80" y="85" text-anchor="middle" font-size="32" font-weight="600" fill="#e4e7ed" id="score-text">80</text>
        <text x="80" y="108" text-anchor="middle" font-size="11" fill="#9ca3af">OVERALL</text>
      </svg>
    </div>
    <div class="verdict" id="verdict">You're in excellent shape today.</div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
