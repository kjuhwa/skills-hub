<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection Pool Tuner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>Connection Pool Tuner</h1>
  <div class="controls">
    <label>Pool Size: <input type="range" id="poolSize" min="2" max="30" value="10"><span id="poolVal">10</span></label>
    <label>Request Rate: <input type="range" id="reqRate" min="1" max="20" value="5"><span id="rateVal">5</span>/s</label>
    <label>Avg Query Time: <input type="range" id="queryTime" min="50" max="2000" value="300"><span id="qtVal">300</span>ms</label>
  </div>
  <div class="panels">
    <div class="panel"><h2>Latency (ms)</h2><canvas id="latChart" width="420" height="200"></canvas></div>
    <div class="panel"><h2>Utilization %</h2><canvas id="utilChart" width="420" height="200"></canvas></div>
  </div>
  <div class="meters" id="meters"></div>
</div>
<script src="app.js"></script>
</body>
</html>
