<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DLQ Autopsy Report</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>🪦 DLQ Autopsy Report</h1>
  <p>Forensic analysis of <span id="count">0</span> deceased messages</p>
</header>
<main>
  <div class="card chart-card">
    <h2>Cause of Death</h2>
    <svg id="donut" viewBox="0 0 200 200"></svg>
    <ul id="donut-legend"></ul>
  </div>
  <div class="card">
    <h2>Expiry Timeline (Last 24h)</h2>
    <svg id="timeline" viewBox="0 0 400 120" preserveAspectRatio="none"></svg>
  </div>
  <div class="card full">
    <h2>Top Offenders</h2>
    <div id="offenders"></div>
  </div>
  <div class="card full">
    <h2>Last Words</h2>
    <div id="quotes"></div>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
