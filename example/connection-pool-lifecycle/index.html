<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connection Lifecycle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Connection Lifecycle Simulator</h1>
<div class="wrap">
  <div class="lane" id="lane-idle"><h2>Idle</h2></div>
  <div class="lane" id="lane-active"><h2>Active</h2></div>
  <div class="lane" id="lane-closing"><h2>Closing</h2></div>
</div>
<div class="bar">
  <button onclick="spawnConn()">New Connection</button>
  <button onclick="sendQuery()">Send Query</button>
  <span id="info">Pool: 0 / 10</span>
</div>
<script src="app.js"></script>
</body>
</html>
