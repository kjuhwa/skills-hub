<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idempotent Function Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>⚗️ Idempotent Function Lab</h1>
  <p class="subtitle">Apply functions repeatedly — idempotent ones stabilize, others don't</p>

  <div class="legend">
    <span class="dot stable"></span> Stable (idempotent)
    <span class="dot unstable"></span> Drifting (non-idempotent)
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
